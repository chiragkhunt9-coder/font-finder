<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Font Finder Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <style>
        :root { --primary: #1a73e8; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; display: flex; justify-content: center; }
        .container { max-width: 700px; width: 100%; background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #222; margin-top: 0; }
        .upload-zone { border: 2px dashed #cbd5e0; padding: 40px; text-align: center; border-radius: 10px; cursor: pointer; background: #fafafa; }
        .img-container { width: 100%; max-height: 400px; margin-top: 20px; display: none; border: 1px solid #ddd; }
        #imageToCrop { max-width: 100%; display: block; }
        .controls { display: flex; gap: 10px; justify-content: center; margin: 20px 0; display: none; }
        button { padding: 12px 24px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; background: var(--primary); color: white; }
        .results-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; margin-top: 20px; }
        .font-card { border: 1px solid #eee; padding: 15px; border-radius: 8px; text-align: center; }
        .font-card img { max-width: 100%; margin-bottom: 10px; }
        .dl-link { color: #fff; background: #28a745; text-decoration: none; padding: 6px 12px; border-radius: 4px; font-size: 12px; }
        .instruction { background: #e8f0fe; padding: 10px; border-radius: 6px; font-size: 13px; margin-bottom: 20px; border-left: 4px solid var(--primary); }
    </style>
</head>
<body>

<div class="container">
    <h1>Font Finder Pro</h1>
    
    <div class="instruction">
        <strong>Setup:</strong> Ensure your <b>"Allow CORS"</b> browser extension is turned <b>ON</b> to avoid connection errors.
    </div>

    <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
        <p>📷 Click to upload screenshot</p>
        <input type="file" id="fileInput" hidden accept="image/*">
    </div>

    <div class="img-container" id="imgWrapper">
        <img id="imageToCrop">
    </div>

    <div class="controls" id="controls">
        <button onclick="processCrop()">Identify Font</button>
        <button style="background:#666;" onclick="window.location.reload()">Reset</button>
    </div>

    <div id="status" style="text-align:center; margin:10px; font-weight:bold; color:var(--primary);"></div>
    <div class="results-grid" id="resultsArea"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
<script>
    const API_KEY = '1ef7cf3d13cf21a6ae03a484ef038941f80dac819cd7d5fe5a196770d33d099c';
    const API_URL = 'https://www.whatfontis.com/api2/';
    let cropper;

    document.getElementById('fileInput').onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
            const img = document.getElementById('imageToCrop');
            img.src = event.target.result;
            document.getElementById('imgWrapper').style.display = 'block';
            document.getElementById('controls').style.display = 'flex';
            document.getElementById('uploadZone').style.display = 'none';
            if (cropper) cropper.destroy();
            cropper = new Cropper(img, { viewMode: 1, autoCropArea: 0.8 });
        };
        reader.readAsDataURL(file);
    };

    async function processCrop() {
        const status = document.getElementById('status');
        const resultsArea = document.getElementById('resultsArea');
        status.innerText = "🔍 Analyzing...";
        resultsArea.innerHTML = '';

        try {
            const canvas = cropper.getCroppedCanvas({ width: 400 }); // Smaller width = faster upload
            const base64Image = canvas.toDataURL('image/png').split(',')[1];

            const params = new URLSearchParams();
            params.append('API_KEY', API_KEY);
            params.append('IMAGEBASE64', '1');
            params.append('urlimagebase64', base64Image);
            params.append('FREEFONTS', '1');
            params.append('limit', '10');

            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: params
            });

            const fonts = await response.json();
            status.innerText = "";

            if (Array.isArray(fonts) && fonts.length > 0) {
                fonts.forEach(font => {
                    const card = document.createElement('div');
                    card.className = 'font-card';
                    card.innerHTML = `
                        <img src="${font.image}" alt="font">
                        <div style="font-size:14px; font-weight:bold; margin-bottom:8px;">${font.title}</div>
                        <a href="${font.url}" target="_blank" class="dl-link">Get Font</a>
                    `;
                    resultsArea.appendChild(card);
                });
            } else {
                status.innerText = "❌ No matching free fonts found.";
            }
        } catch (err) {
            status.innerHTML = "❌ Connection Error. <br>Please make sure the 'Allow CORS' extension is active.";
        }
    }
</script>
</body>
</html>
