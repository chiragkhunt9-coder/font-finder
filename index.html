<script>
    // YOUR API KEY
    const API_KEY = '1ef7cf3d13cf21a6ae03a484ef038941f80dac819cd7d5fe5a196770d33d099c';
    
    // We will use this proxy to bypass the "Connection Error" (CORS)
    const PROXY_URL = 'https://cors-anywhere.herokuapp.com/';
    const TARGET_URL = 'https://www.whatfontis.com/api2/';

    let cropper;
    const fileInput = document.getElementById('fileInput');
    const image = document.getElementById('imageToCrop');
    const wrapper = document.getElementById('imgWrapper');
    const controls = document.getElementById('controls');
    const status = document.getElementById('status');
    const resultsArea = document.getElementById('resultsArea');

    // 1. IMPROVED IMAGE UPLOAD LOGIC
    fileInput.onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (event) => {
            image.src = event.target.result;
            
            // Show the cropper UI
            wrapper.style.display = 'block';
            controls.style.display = 'flex';
            document.getElementById('uploadZone').style.display = 'none';
            
            if (cropper) cropper.destroy();
            
            // Initialize Cropper
            cropper = new Cropper(image, {
                viewMode: 1,
                autoCropArea: 0.8,
                responsive: true,
                restore: false,
            });
        };
        reader.readAsDataURL(file);
    };

    // 2. UPDATED API CALL WITH PROXY
    async function processCrop() {
        if (!cropper) return;
        
        status.innerText = "⏳ Sending to WhatFontIs... (Check Console F12 if slow)";
        resultsArea.innerHTML = '';

        try {
            const canvas = cropper.getCroppedCanvas({
                width: 500, // Resize slightly to make the request faster
            });
            const base64Image = canvas.toDataURL('image/png').split(',')[1];

            const params = new URLSearchParams();
            params.append('API_KEY', API_KEY);
            params.append('IMAGEBASE64', '1');
            params.append('urlimagebase64', base64Image);
            params.append('FREEFONTS', '1');
            params.append('limit', '8');

            // Using the Proxy here to fix the "Connection Error"
            const response = await fetch(PROXY_URL + TARGET_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: params
            });

            const fonts = await response.json();
            status.innerText = "";

            if (Array.isArray(fonts) && fonts.length > 0) {
                fonts.forEach(font => {
                    const card = document.createElement('div');
                    card.className = 'font-card';
                    card.innerHTML = `
                        <img src="${font.image}" alt="preview">
                        <span class="font-name">${font.title}</span>
                        <a href="${font.url}" target="_blank" class="dl-link">Download Font</a>
                    `;
                    resultsArea.appendChild(card);
                });
            } else {
                status.innerText = "❌ No fonts found. Try a different crop.";
            }
        } catch (err) {
            console.error("FULL ERROR LOG:", err);
            status.innerHTML = `❌ Error: ${err.message}<br><small>If using proxy, ensure you visited <a href="https://cors-anywhere.herokuapp.com/corsdemo" target="_blank">this link</a> once.</small>`;
        }
    }
</script>
