<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Precision Font Finder</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <style>
        :root { --primary: #1a73e8; --success: #28a745; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #333; }
        .container { max-width: 800px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h1 { text-align: center; margin-top: 0; color: #111; }
        
        /* Cropper Area */
        .img-container { width: 100%; max-height: 400px; margin-top: 20px; background-color: #f7f7f7; display: none; overflow: hidden; }
        #imageToCrop { max-width: 100%; }
        
        .controls { display: flex; gap: 10px; justify-content: center; margin: 20px 0; display: none; }
        button { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: var(--success); color: white; }
        
        .upload-zone { border: 2px dashed #cbd5e0; padding: 30px; text-align: center; border-radius: 10px; cursor: pointer; background: #fafafa; }
        
        .results-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; margin-top: 20px; }
        .font-card { border: 1px solid #eee; padding: 15px; border-radius: 8px; background: white; text-align: center; }
        .font-card img { max-width: 100%; margin-bottom: 10px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .font-name { display: block; font-weight: bold; margin-bottom: 10px; }
        .dl-link { color: white; background: var(--success); text-decoration: none; padding: 5px 15px; border-radius: 4px; font-size: 13px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Font Finder <span style="font-size: 18px; font-weight: normal;">(with Auto-Crop)</span></h1>
    
    <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
        <p>📷 Click to upload your screenshot</p>
        <input type="file" id="fileInput" hidden accept="image/*">
    </div>

    <div class="img-container" id="imgWrapper">
        <img id="imageToCrop">
    </div>

    <div class="controls" id="controls">
        <button class="btn-primary" onclick="processCrop()">Identify Selected Area</button>
        <button style="background:#666; color:white;" onclick="location.reload()">Reset</button>
    </div>

    <div id="status" style="text-align:center; margin:10px; font-weight:bold; color:var(--primary);"></div>
    <div class="results-grid" id="resultsArea"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

<script>
    const API_KEY = '1ef7cf3d13cf21a6ae03a484ef038941f80dac819cd7d5fe5a196770d33d099c';
    let cropper;
    const fileInput = document.getElementById('fileInput');
    const image = document.getElementById('imageToCrop');
    const wrapper = document.getElementById('imgWrapper');
    const controls = document.getElementById('controls');
    const status = document.getElementById('status');
    const resultsArea = document.getElementById('resultsArea');

    fileInput.onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (event) => {
            image.src = event.target.result;
            wrapper.style.display = 'block';
            controls.style.display = 'flex';
            document.getElementById('uploadZone').style.display = 'none';
            
            if (cropper) cropper.destroy();
            cropper = new Cropper(image, {
                viewMode: 1,
                autoCropArea: 0.5,
                movable: true,
                zoomable: true,
            });
        };
        reader.readAsDataURL(file);
    };

    async function processCrop() {
        if (!cropper) return;
        
        status.innerText = "⏳ Extracting and Analyzing...";
        resultsArea.innerHTML = '';

        // Get cropped canvas
        const canvas = cropper.getCroppedCanvas();
        // Convert to Base64 (remove the prefix "data:image/png;base64,")
        const base64Image = canvas.toDataURL('image/png').split(',')[1];

        const params = new URLSearchParams();
        params.append('API_KEY', API_KEY);
        params.append('IMAGEBASE64', '1');
        params.append('urlimagebase64', base64Image);
        params.append('FREEFONTS', '1');
        params.append('limit', '8');

        try {
            const response = await fetch('https://www.whatfontis.com/api2/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: params
            });

            const fonts = await response.json();
            status.innerText = "";

            if (Array.isArray(fonts) && fonts.length > 0) {
                fonts.forEach(font => {
                    const card = document.createElement('div');
                    card.className = 'font-card';
                    card.innerHTML = `
                        <img src="${font.image}" alt="preview">
                        <span class="font-name">${font.title}</span>
                        <a href="${font.url}" target="_blank" class="dl-link">Download Font</a>
                    `;
                    resultsArea.appendChild(card);
                });
            } else {
                status.innerText = "❌ No matching fonts found. Try a different crop.";
            }
        } catch (err) {
            status.innerText = "❌ Connection Error. Check your internet.";
        }
    }
</script>
</body>
</html>
